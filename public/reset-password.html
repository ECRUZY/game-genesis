<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Сброс пароля — Game Genesis</title>
<style>
  :root{--bg:#080c12;--card:#0f1a28;--gold:#f0c040;--text:#e8f0f8;--muted:#4a6a8a;--border:#1e3a5f;--red:#e05050;--green:#1D9E75}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
  .logo{font-size:13px;font-weight:900;letter-spacing:2px;color:var(--gold);margin-bottom:28px}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
  .field{margin-bottom:18px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
  input{width:100%;background:#0a1520;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
  input:focus{border-color:var(--gold)}
  .strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s;background:#1e3a5f}
  .strength.weak{background:#e05050;width:33%}
  .strength.medium{background:#ef9f27;width:66%}
  .strength.strong{background:var(--green);width:100%}
  .btn{width:100%;background:var(--gold);color:#080c12;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
  .msg.error{background:rgba(224,80,80,.1);border:1px solid var(--red);color:var(--red)}
  .msg.success{background:rgba(29,158,117,.1);border:1px solid var(--green);color:var(--green)}
  .back{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:13px;text-decoration:none}
  .back:hover{color:var(--text)}
  /* Forgot password form */
  #forgot-form{}
  #reset-form{display:none}
  #success-screen{display:none;text-align:center}
  .success-icon{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ GAME GENESIS</div>

  <!-- Шаг 1: ввод email -->
  <div id="forgot-form">
    <h1>Забыл пароль?</h1>
    <p class="sub">Введи email — пришлём ссылку для сброса</p>
    <div class="msg error" id="forgot-error"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="твой@email.ru" autocomplete="email">
    </div>
    <button class="btn" id="forgot-btn" onclick="sendReset()">Отправить ссылку</button>
    <a href="/index.html" class="back">← Вернуться на главную</a>
  </div>

  <!-- Шаг 2: новый пароль (если token в URL) -->
  <div id="reset-form">
    <h1>Новый пароль</h1>
    <p class="sub">Придумай надёжный пароль</p>
    <div class="msg error" id="reset-error"></div>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="new-password" placeholder="Минимум 8 символов" oninput="checkStrength(this.value)">
      <div class="strength" id="strength-bar"></div>
    </div>
    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" id="confirm-password" placeholder="Повторите пароль">
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Сохранить пароль</button>
  </div>

  <!-- Успех -->
  <div id="success-screen">
    <div class="success-icon">✅</div>
    <h1 id="success-title">Письмо отправлено!</h1>
    <p class="sub" id="success-sub">Проверь почту и перейди по ссылке в письме. Ссылка действует 1 час.</p>
    <a href="/index.html" class="back">← На главную</a>
  </div>
</div>

<script>
var token = new URLSearchParams(location.search).get('token')

// Если есть токен — показываем форму нового пароля
if (token) {
  document.getElementById('forgot-form').style.display = 'none'
  document.getElementById('reset-form').style.display = 'block'
}

function checkStrength(val) {
  var bar = document.getElementById('strength-bar')
  if (val.length < 6) { bar.className = 'strength weak' }
  else if (val.length < 10 || !/[0-9]/.test(val)) { bar.className = 'strength medium' }
  else { bar.className = 'strength strong' }
}

async function sendReset() {
  var email = document.getElementById('forgot-email').value.trim()
  var btn = document.getElementById('forgot-btn')
  var err = document.getElementById('forgot-error')
  err.style.display = 'none'

  if (!email) { err.textContent = 'Введи email'; err.style.display = 'block'; return }

  btn.disabled = true; btn.textContent = 'Отправляем...'

  try {
    var r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    })
    var data = await r.json()
    if (data.success) {
      document.getElementById('forgot-form').style.display = 'none'
      document.getElementById('success-screen').style.display = 'block'
    } else {
      err.textContent = data.error || 'Ошибка'
      err.style.display = 'block'
      btn.disabled = false; btn.textContent = 'Отправить ссылку'
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения'
    err.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Отправить ссылку'
  }
}

async function doReset() {
  var pass = document.getElementById('new-password').value
  var conf = document.getElementById('confirm-password').value
  var btn  = document.getElementById('reset-btn')
  var err  = document.getElementById('reset-error')
  err.style.display = 'none'

  if (pass.length < 8) { err.textContent = 'Пароль минимум 8 символов'; err.style.display = 'block'; return }
  if (pass !== conf)   { err.textContent = 'Пароли не совпадают'; err.style.display = 'block'; return }

  btn.disabled = true; btn.textContent = 'Сохраняем...'

  try {
    var r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pass })
    })
    var data = await r.json()
    if (data.success) {
      document.getElementById('reset-form').style.display = 'none'
      var s = document.getElementById('success-screen')
      s.style.display = 'block'
      document.getElementById('success-title').textContent = 'Пароль изменён!'
      document.getElementById('success-sub').textContent = 'Теперь можешь войти с новым паролем.'
    } else {
      err.textContent = data.error || 'Ошибка'
      err.style.display = 'block'
      btn.disabled = false; btn.textContent = 'Сохранить пароль'
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения'
    err.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Сохранить пароль'
  }
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return
  if (token) doReset(); else sendReset()
})
</script>
</body>
</html>
